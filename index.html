<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>সার্ভার সমস্যা | 500 Error</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            font-family: 'Inter', 'Segoe UI', 'Hind Siliguri', system-ui, -apple-system, sans-serif;
            background: #0a0a14;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        /* মেইন কন্টেইনার */
        .container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, transparent 55%),
                        radial-gradient(ellipse at 70% 80%, #1a1030 0%, transparent 55%),
                        #0a0a14;
            position: relative;
        }

        /* সিম্পল গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 94, 94, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(46, 166, 255, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        /* গ্লাস কার্ড */
        .glass-card {
            position: relative;
            z-index: 2;
            background: rgba(22, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 35px 28px;
            text-align: center;
            width: 100%;
            max-width: 440px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        /* এরর ইমোজি */
        .error-emoji {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
            animation: softBounce 3s ease-in-out infinite;
        }

        @keyframes softBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* এরর কোড */
        .error-code {
            font-size: 68px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff5e5e, #ff8f8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        /* টাইটেল */
        .error-title {
            font-size: 20px;
            font-weight: 700;
            color: #f0f0f5;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .error-title span {
            color: #ff8f8f;
        }

        /* মেসেজ */
        .error-message {
            font-size: 14px;
            color: #a0a0b8;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        /* ডিভাইডার */
        .divider {
            width: 60px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 20px;
            border-radius: 5px;
        }

        /* বাটন গ্রুপ */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        @media (min-width: 400px) {
            .button-group {
                flex-direction: row;
                justify-content: center;
            }
        }

        /* বাটন */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
            width: 100%;
            max-width: 260px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.3px;
        }

        @media (min-width: 400px) {
            .btn {
                width: auto;
                min-width: 160px;
                max-width: none;
                flex: 1;
            }
        }

        /* চ্যানেল বাটন */
        .btn-channel {
            background: rgba(46, 166, 255, 0.2);
            border: 1px solid rgba(46, 166, 255, 0.35);
            box-shadow: 0 4px 15px rgba(46, 166, 255, 0.15);
        }

        .btn-channel:active {
            transform: scale(0.96);
            background: rgba(46, 166, 255, 0.3);
            box-shadow: 0 2px 8px rgba(46, 166, 255, 0.2);
        }

        /* গ্রুপ বাটন */
        .btn-group {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.35);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.15);
        }

        .btn-group:active {
            transform: scale(0.96);
            background: rgba(139, 92, 246, 0.3);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.2);
        }

        .btn-icon {
            font-size: 18px;
        }

        .btn-text {
            font-size: 13px;
            font-weight: 600;
        }

        /* ফুটার */
        .footer-text {
            margin-top: 16px;
            font-size: 11px;
            color: #6a6a85;
            letter-spacing: 0.5px;
        }

        /* ==================== রেস্পন্সিভ ==================== */

        /* ছোট মোবাইল */
        @media (max-width: 360px) {
            .glass-card {
                padding: 28px 18px;
                border-radius: 24px;
            }
            .error-emoji { font-size: 44px; }
            .error-code { font-size: 54px; }
            .error-title { font-size: 17px; }
            .error-message { font-size: 13px; }
            .btn { padding: 12px 20px; }
            .btn-icon { font-size: 16px; }
            .btn-text { font-size: 12px; }
        }

        /* ল্যান্ডস্কেপ */
        @media (max-width: 500px) and (orientation: landscape) {
            .glass-card {
                padding: 20px 24px;
                border-radius: 20px;
                max-width: 400px;
            }
            .error-emoji { font-size: 36px; margin-bottom: 6px; }
            .error-code { font-size: 42px; }
            .error-title { font-size: 15px; }
            .error-message { font-size: 12px; margin-bottom: 10px; }
            .divider { margin-bottom: 12px; }
            .button-group { flex-direction: row; gap: 8px; }
            .btn { padding: 10px 14px; }
            .btn-icon { font-size: 15px; }
            .btn-text { font-size: 11px; }
            .footer-text { margin-top: 10px; font-size: 10px; }
        }

        /* ট্যাবলেট */
        @media (min-width: 768px) {
            .glass-card {
                max-width: 480px;
                padding: 40px 35px;
                border-radius: 32px;
            }
            .error-emoji { font-size: 64px; }
            .error-code { font-size: 76px; }
            .error-title { font-size: 22px; }
            .error-message { font-size: 15px; }
            .btn { padding: 15px 28px; }
        }

        /* ডেস্কটপ hover */
        @media (hover: hover) {
            .btn-channel:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 25px rgba(46, 166, 255, 0.3);
            }
            .btn-group:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
            }
        }

        /* reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .error-emoji { animation: none; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট -->
        <div class="bg-gradient"></div>

        <!-- গ্লাস কার্ড -->
        <div class="glass-card">

            <!-- ইমোজি -->
            <span class="error-emoji">😞</span>

            <!-- এরর কোড -->
            <div class="error-code">500</div>

            <!-- টাইটেল -->
            <div class="error-title">
                দুঃখিত! <span>সার্ভার সমস্যা</span>
            </div>

            <!-- মেসেজ -->
            <div class="error-message">
                আমাদের সার্ভারে কিছু সমস্যা দেখা দিয়েছে।
                <br>আমরা দ্রুত এটি ঠিক করার চেষ্টা করছি।
            </div>

            <!-- ডিভাইডার -->
            <div class="divider"></div>

            <!-- বাটন -->
            <div class="button-group">
                <a href="https://t.me/your_channel" target="_blank" class="btn btn-channel" rel="noopener">
                    <span class="btn-icon">📢</span>
                    <span class="btn-text">জয়েন TG চ্যানেল</span>
                </a>

                <a href="https://t.me/your_group" target="_blank" class="btn btn-group" rel="noopener">
                    <span class="btn-icon">💬</span>
                    <span class="btn-text">জয়েন TG গ্রুপ</span>
                </a>
            </div>

            <!-- ফুটার -->
            <div class="footer-text">ধন্যবাদ আপনার ধৈর্যের জন্য 🙏</div>

        </div>
    </div>

</body>
</html>
